name: Release CLI

on:
  push:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "packages/core/**"
      - "packages/provider-es/**"
      - "packages/types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - ".releaserc.json"
      - ".github/workflows/test-code.yml"
      - ".github/workflows/release-cli.yml"

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  test-code:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: ./.github/workflows/test-code.yml

  release:
    needs: test-code
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack CLI
        id: pack_cli
        working-directory: apps/cli
        run: |
          TARBALL_PATH=$(pnpm pack --pack-destination /tmp | tail -n 1)
          echo "tarball_path=${TARBALL_PATH}" >> "$GITHUB_OUTPUT"

      - name: Verify CLI Package Artifact
        run: pnpm verify:cli-package "${{ steps.pack_cli.outputs.tarball_path }}"

      - name: Release
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
